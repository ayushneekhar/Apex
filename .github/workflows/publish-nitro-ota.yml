name: Publish Nitro OTA

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: GitHub Environment to load secrets/vars from
        type: choice
        required: true
        default: development
        options:
          - development
          - production
      platform:
        description: Target platform OTA bundle
        type: choice
        required: true
        default: android
        options:
          - android
          - ios
      ota_branch:
        description: OTA branch to publish (defaults to nitro-ota-<platform>-<deployment_environment>)
        required: false
        type: string
      target_app_version:
        description: Target binary app version (defaults to app.json expo.version)
        required: false
        type: string
      release_notes:
        description: Optional release notes for ota.version.json
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-nitro-ota-${{ github.ref }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.prepare.outputs.should_publish }}
      skip_reason: ${{ steps.prepare.outputs.skip_reason }}
      deployment_environment: ${{ steps.prepare.outputs.deployment_environment }}
      platforms_json: ${{ steps.prepare.outputs.platforms_json }}
      ota_version: ${{ steps.prepare.outputs.ota_version }}
      target_app_version: ${{ steps.prepare.outputs.target_app_version }}
      release_notes: ${{ steps.prepare.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve run configuration and check for native changes
        id: prepare
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          INPUT_DEPLOYMENT_ENVIRONMENT: ${{ inputs.deployment_environment }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_TARGET_APP_VERSION: ${{ inputs.target_app_version }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          write_output() {
            local key="$1"
            local value="$2"
            {
              echo "${key}<<__EOF__"
              printf '%s\n' "$value"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          }

          APP_VERSION="$(node -p "require('./app.json').expo.version")"
          write_output "target_app_version" "${INPUT_TARGET_APP_VERSION:-$APP_VERSION}"

          if [[ "$APP_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
          else
            MAJOR="0"
            MINOR="0"
          fi
          PATCH_COMPONENT=$((RUN_NUMBER * 100 + RUN_ATTEMPT))
          OTA_VERSION="${MAJOR}.${MINOR}.${PATCH_COMPONENT}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            write_output "deployment_environment" "${INPUT_DEPLOYMENT_ENVIRONMENT}"
            write_output "platforms_json" "[\"${INPUT_PLATFORM}\"]"
            write_output "ota_version" "${OTA_VERSION}"
            write_output "release_notes" "${INPUT_RELEASE_NOTES}"
            write_output "skip_reason" ""
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          write_output "deployment_environment" "production"
          write_output "platforms_json" "[\"android\",\"ios\"]"

          write_output "ota_version" "$OTA_VERSION"
          write_output "release_notes" "Auto OTA from main (${HEAD_SHA:0:7})"

          ZERO_SHA="0000000000000000000000000000000000000000"
          BASE_SHA="${BEFORE_SHA}"
          if [ "$BASE_SHA" = "$ZERO_SHA" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          if [ -z "$BASE_SHA" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            write_output "skip_reason" ""
            {
              echo "## Nitro OTA Auto Publish"
              echo "No diff base SHA found for this push; proceeding without native-change gating."
              echo "- Target app version: ${APP_VERSION}"
              echo "- OTA version: ${OTA_VERSION}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          WORKFLOW_CHANGE_REGEX='^\.github/workflows/'
          NATIVE_CHANGE_REGEX='^(android/|ios/|app\.json$|app\.config\.(js|ts|json|mjs|cjs)$|package\.json$|yarn\.lock$|package-lock\.json$|pnpm-lock\.yaml$|bun\.lockb?$)'

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq "$WORKFLOW_CHANGE_REGEX"; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            write_output "skip_reason" "Workflow files changed in this push; skipping automatic Nitro OTA publish."
            {
              echo "## Nitro OTA Auto Publish Skipped"
              echo "Workflow files changed between ${BASE_SHA:0:7} and ${HEAD_SHA:0:7}."
              echo ""
              echo "Changed files:"
              echo '```'
              printf '%s\n' "$CHANGED_FILES"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq "$NATIVE_CHANGE_REGEX"; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            write_output "skip_reason" "Native-related files changed in this push; skipping automatic Nitro OTA publish."
            {
              echo "## Nitro OTA Auto Publish Skipped"
              echo "Native-related files changed between ${BASE_SHA:0:7} and ${HEAD_SHA:0:7}."
              echo ""
              echo "Changed files:"
              echo '```'
              printf '%s\n' "$CHANGED_FILES"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          write_output "skip_reason" ""
          {
            echo "## Nitro OTA Auto Publish"
            echo "No native-related file changes detected between ${BASE_SHA:0:7} and ${HEAD_SHA:0:7}."
            echo "- Target app version: ${APP_VERSION}"
            echo "- OTA version: ${OTA_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.prepare.outputs.platforms_json) }}
    environment: ${{ needs.prepare.outputs.deployment_environment }}
    env:
      EXPO_PUBLIC_SPOTIFY_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_SPOTIFY_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_DRIVE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_DRIVE_ANDROID_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_DRIVE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_DRIVE_IOS_CLIENT_ID }}
      EXPO_PUBLIC_NITRO_OTA_GITHUB_URL: ${{ vars.EXPO_PUBLIC_NITRO_OTA_GITHUB_URL }}
      EXPO_PUBLIC_NITRO_OTA_VERSION_PATH: ${{ vars.EXPO_PUBLIC_NITRO_OTA_VERSION_PATH }}
      EXPO_PUBLIC_NITRO_OTA_ANDROID_REF: ${{ vars.EXPO_PUBLIC_NITRO_OTA_ANDROID_REF }}
      EXPO_PUBLIC_NITRO_OTA_IOS_REF: ${{ vars.EXPO_PUBLIC_NITRO_OTA_IOS_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Validate required environment variables
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${EXPO_PUBLIC_SPOTIFY_CLIENT_ID}" ]; then
            echo "Missing EXPO_PUBLIC_SPOTIFY_CLIENT_ID for '${{ needs.prepare.outputs.deployment_environment }}' environment." >&2
            exit 1
          fi
          if [ "${{ matrix.platform }}" = "android" ] && [ -z "${EXPO_PUBLIC_GOOGLE_DRIVE_ANDROID_CLIENT_ID}" ]; then
            echo "Missing EXPO_PUBLIC_GOOGLE_DRIVE_ANDROID_CLIENT_ID for '${{ needs.prepare.outputs.deployment_environment }}' environment." >&2
            exit 1
          fi
          if [ "${{ matrix.platform }}" = "ios" ] && [ -z "${EXPO_PUBLIC_GOOGLE_DRIVE_IOS_CLIENT_ID}" ]; then
            echo "Missing EXPO_PUBLIC_GOOGLE_DRIVE_IOS_CLIENT_ID for '${{ needs.prepare.outputs.deployment_environment }}' environment." >&2
            exit 1
          fi

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if yarn --version | grep -q '^1\.'; then
            yarn install --frozen-lockfile
          else
            yarn install --immutable
          fi

      - name: Build Nitro OTA bundle
        shell: bash
        env:
          RESOLVED_OTA_VERSION: ${{ needs.prepare.outputs.ota_version }}
          RESOLVED_TARGET_APP_VERSION: ${{ needs.prepare.outputs.target_app_version }}
          RESOLVED_RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
        run: |
          set -euo pipefail
          CMD=(yarn nitro-ota:build --platform "${{ matrix.platform }}" --ota-version "${RESOLVED_OTA_VERSION}")

          if [ -n "${RESOLVED_TARGET_APP_VERSION}" ]; then
            CMD+=(--target-app-version "${RESOLVED_TARGET_APP_VERSION}")
          fi

          if [ -n "${RESOLVED_RELEASE_NOTES}" ]; then
            CMD+=(--release-notes "${RESOLVED_RELEASE_NOTES}")
          fi

          "${CMD[@]}"

      - name: Resolve OTA branch
        id: branch
        shell: bash
        env:
          INPUT_OTA_BRANCH: ${{ inputs.ota_branch }}
        run: |
          set -euo pipefail
          BRANCH="${INPUT_OTA_BRANCH}"
          if [ -z "$BRANCH" ]; then
            BRANCH="nitro-ota-${{ matrix.platform }}-${{ needs.prepare.outputs.deployment_environment }}"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upload built OTA artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: nitro-ota-${{ matrix.platform }}-${{ needs.prepare.outputs.ota_version }}
          path: .artifacts/nitro-ota/${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish OTA bundle to branch snapshot
        shell: bash
        env:
          OTA_BRANCH: ${{ steps.branch.outputs.name }}
          OTA_PLATFORM: ${{ matrix.platform }}
          OTA_VERSION: ${{ needs.prepare.outputs.ota_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKTREE_DIR="$(mktemp -d)"
          TARGET_DIR=".artifacts/nitro-ota/${OTA_PLATFORM}"

          cleanup() {
            git worktree remove --force "$WORKTREE_DIR" >/dev/null 2>&1 || true
            rm -rf "$WORKTREE_DIR"
          }
          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin "$OTA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$OTA_BRANCH"
            git worktree add "$WORKTREE_DIR" "origin/$OTA_BRANCH"
            git -C "$WORKTREE_DIR" checkout -B "$OTA_BRANCH"
          else
            git worktree add --detach "$WORKTREE_DIR"
            git -C "$WORKTREE_DIR" checkout --orphan "$OTA_BRANCH"
          fi

          find "$WORKTREE_DIR" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$TARGET_DIR"/. "$WORKTREE_DIR"/

          cat > "$WORKTREE_DIR/README.md" <<README
          # Nitro OTA Snapshot (${OTA_PLATFORM})

          This branch is auto-generated by the \`Publish Nitro OTA\` GitHub Action.
          Nitro OTA clients download this branch as a ZIP archive and read \`ota.version.json\`.
          README

          git -C "$WORKTREE_DIR" add -A

          if git -C "$WORKTREE_DIR" diff --cached --quiet; then
            echo "No OTA snapshot changes detected. Skipping commit/push."
            exit 0
          fi

          git -C "$WORKTREE_DIR" commit \
            -m "chore(ota): publish ${OTA_PLATFORM} ${OTA_VERSION}" \
            -m "Source commit: ${GITHUB_SHA}"

          git -C "$WORKTREE_DIR" push origin "$OTA_BRANCH" --force

      - name: Print Nitro OTA URLs
        shell: bash
        env:
          OTA_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          VERSION_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${OTA_BRANCH}/ota.version.json"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/heads/${OTA_BRANCH}.zip"
          echo "OTA branch: $OTA_BRANCH"
          echo "Version URL: $VERSION_URL"
          echo "Download ZIP URL: $ZIP_URL"
          {
            echo "## Nitro OTA Published"
            echo "- Platform: ${{ matrix.platform }}"
            echo "- Environment: ${{ needs.prepare.outputs.deployment_environment }}"
            echo "- OTA version: ${{ needs.prepare.outputs.ota_version }}"
            echo "- OTA branch: ${OTA_BRANCH}"
            echo "- Version URL: ${VERSION_URL}"
            echo "- Download ZIP URL: ${ZIP_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
