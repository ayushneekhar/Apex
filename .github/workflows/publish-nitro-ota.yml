name: Publish Nitro OTA

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform OTA bundle
        type: choice
        required: true
        default: android
        options:
          - android
          - ios
      ota_version:
        description: OTA version (prefer semver, e.g. 1.0.1)
        required: true
        type: string
      ota_branch:
        description: OTA branch to publish (defaults to nitro-ota-<platform>-production)
        required: false
        type: string
      target_app_version:
        description: Target binary app version (defaults to app.json expo.version)
        required: false
        type: string
      release_notes:
        description: Optional release notes for ota.version.json
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-nitro-ota-${{ github.ref }}-${{ inputs.platform }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if yarn --version | grep -q '^1\.'; then
            yarn install --frozen-lockfile
          else
            yarn install --immutable
          fi

      - name: Build Nitro OTA bundle
        shell: bash
        run: |
          set -euo pipefail
          CMD=(yarn nitro-ota:build --platform "${{ inputs.platform }}" --ota-version "${{ inputs.ota_version }}")

          if [ -n "${{ inputs.target_app_version }}" ]; then
            CMD+=(--target-app-version "${{ inputs.target_app_version }}")
          fi

          if [ -n "${{ inputs.release_notes }}" ]; then
            CMD+=(--release-notes "${{ inputs.release_notes }}")
          fi

          "${CMD[@]}"

      - name: Resolve OTA branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ inputs.ota_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="nitro-ota-${{ inputs.platform }}-production"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upload built OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nitro-ota-${{ inputs.platform }}-${{ inputs.ota_version }}
          path: .artifacts/nitro-ota/${{ inputs.platform }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish OTA bundle to branch snapshot
        shell: bash
        env:
          OTA_BRANCH: ${{ steps.branch.outputs.name }}
          OTA_PLATFORM: ${{ inputs.platform }}
          OTA_VERSION: ${{ inputs.ota_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKTREE_DIR="$(mktemp -d)"
          TARGET_DIR=".artifacts/nitro-ota/${OTA_PLATFORM}"

          cleanup() {
            git worktree remove --force "$WORKTREE_DIR" >/dev/null 2>&1 || true
            rm -rf "$WORKTREE_DIR"
          }
          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin "$OTA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$OTA_BRANCH"
            git worktree add "$WORKTREE_DIR" "origin/$OTA_BRANCH"
            git -C "$WORKTREE_DIR" checkout -B "$OTA_BRANCH"
          else
            git worktree add --detach "$WORKTREE_DIR"
            git -C "$WORKTREE_DIR" checkout --orphan "$OTA_BRANCH"
          fi

          find "$WORKTREE_DIR" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$TARGET_DIR"/. "$WORKTREE_DIR"/

          cat > "$WORKTREE_DIR/README.md" <<README
          # Nitro OTA Snapshot (${OTA_PLATFORM})

          This branch is auto-generated by the \`Publish Nitro OTA\` GitHub Action.
          Nitro OTA clients download this branch as a ZIP archive and read \`ota.version.json\`.
          README

          git -C "$WORKTREE_DIR" add -A

          if git -C "$WORKTREE_DIR" diff --cached --quiet; then
            echo "No OTA snapshot changes detected. Skipping commit/push."
            exit 0
          fi

          git -C "$WORKTREE_DIR" commit \
            -m "chore(ota): publish ${OTA_PLATFORM} ${OTA_VERSION}" \
            -m "Source commit: ${GITHUB_SHA}"

          git -C "$WORKTREE_DIR" push origin "$OTA_BRANCH" --force

      - name: Print Nitro OTA URLs
        shell: bash
        env:
          OTA_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          VERSION_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${OTA_BRANCH}/ota.version.json"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/heads/${OTA_BRANCH}.zip"
          echo "OTA branch: $OTA_BRANCH"
          echo "Version URL: $VERSION_URL"
          echo "Download ZIP URL: $ZIP_URL"
          {
            echo "## Nitro OTA Published"
            echo "- Platform: ${{ inputs.platform }}"
            echo "- OTA version: ${{ inputs.ota_version }}"
            echo "- OTA branch: ${OTA_BRANCH}"
            echo "- Version URL: ${VERSION_URL}"
            echo "- Download ZIP URL: ${ZIP_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
